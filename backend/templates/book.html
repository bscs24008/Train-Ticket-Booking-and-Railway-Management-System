<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Ticket</title>
</head>

<body>
    <h2>Book a Ticket</h2>

    <form method="POST" action="/book">
        <label for="train">Select Train:</label><br>
        <select name="train_id" id="train" required>
            {% for train in trains %}
            <option value="{{ train['id'] }}">{{ train['name'] }}</option>
            {% endfor %}
        </select><br><br>

        <label for="seat_class">Select Class:</label><br>
        <select name="seat_class" id="seat_class" required>
            <option value="Economy">Economy</option>
            <option value="Business">Business</option>
            <option value="AC">AC</option>
        </select><br><br>

        <label for="travel_date">Travel Date:</label><br>
        <input type="date" name="travel_date" id="travel_date" required><br><br>

        <button type="submit">Book Ticket</button>
    </form>

    <br>
    <a href="/passenger_dashboard">Back to Dashboard</a>
</body>

</html>

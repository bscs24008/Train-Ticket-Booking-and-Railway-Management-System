<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>

<body>
    <h2>Passenger Login</h2>
    <form method="POST" action="/login">
        <label>CNIC:</label><br>
        <input type="text" name="cnic" maxlength="13" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>
    </form>
</body>

</html>
